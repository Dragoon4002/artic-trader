openapi: 3.1.0
info:
  title: Artic Hub
  version: 0.1.0-alpha
paths:
  /auth/register:
    post:
      tags:
      - auth
      summary: Register
      operationId: register_auth_register_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /auth/login:
    post:
      tags:
      - auth
      summary: Login
      operationId: login_auth_login_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /auth/refresh:
    post:
      tags:
      - auth
      summary: Refresh
      operationId: refresh_auth_refresh_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /auth/logout:
    post:
      tags:
      - auth
      summary: Logout
      operationId: logout_auth_logout_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /auth/me:
    get:
      tags:
      - auth
      summary: Me
      operationId: me_auth_me_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
  /api/keys:
    post:
      tags:
      - keys
      summary: Create Key
      operationId: create_key_api_keys_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKeyResponse'
  /internal/v1/credits/heartbeat:
    post:
      tags:
      - internal
      summary: Credits Heartbeat
      description: User-server pings every N seconds with alive-agent count. Phase
        4 stub.
      operationId: credits_heartbeat_internal_v1_credits_heartbeat_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /internal/v1/indexer/flush:
    post:
      tags:
      - internal
      summary: Indexer Flush
      description: User-server pushes indexer rows pre-drain. Phase 4 stub.
      operationId: indexer_flush_internal_v1_indexer_flush_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /internal/v1/otel/spans:
    post:
      tags:
      - internal
      summary: Otel Spans
      description: User-server pushes OTel spans. Phase 2 stub.
      operationId: otel_spans_internal_v1_otel_spans_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /api/market/price/{symbol}:
    get:
      tags:
      - market
      summary: Price One
      operationId: price_one_api_market_price__symbol__get
      parameters:
      - name: symbol
        in: path
        required: true
        schema:
          type: string
          title: Symbol
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/market/prices:
    get:
      tags:
      - market
      summary: Price All
      operationId: price_all_api_market_prices_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /api/market/candles:
    get:
      tags:
      - market
      summary: Candles
      operationId: candles_api_market_candles_get
      parameters:
      - name: symbol
        in: query
        required: true
        schema:
          type: string
          title: Symbol
      - name: interval
        in: query
        required: false
        schema:
          type: string
          default: 15m
          title: Interval
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/secrets:
    get:
      tags:
      - secrets
      summary: List Secrets
      description: "Return key names only \u2014 never plaintext, never ciphertext."
      operationId: list_secrets_api_v1_secrets_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
    post:
      tags:
      - secrets
      summary: Put Secret
      description: Create/update a user secret. Body carries plaintext over TLS; server
        encrypts.
      operationId: put_secret_api_v1_secrets_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SecretWrite'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/secrets/{key_name}:
    delete:
      tags:
      - secrets
      summary: Delete Secret
      operationId: delete_secret_api_v1_secrets__key_name__delete
      parameters:
      - name: key_name
        in: path
        required: true
        schema:
          type: string
          title: Key Name
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /health:
    get:
      summary: Health
      operationId: health_health_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response Health Health Get
  /health/ready:
    get:
      summary: Health Ready
      description: 'Shallow readiness: DB connect. VM provider + market freshness
        deferred to monitoring.'
      operationId: health_ready_health_ready_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response Health Ready Health Ready Get
components:
  schemas:
    ApiKeyResponse:
      properties:
        api_key:
          type: string
          title: Api Key
      type: object
      required:
      - api_key
      title: ApiKeyResponse
    AuthRequest:
      properties:
        email:
          type: string
          format: email
          title: Email
        password:
          type: string
          title: Password
      type: object
      required:
      - email
      - password
      title: AuthRequest
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    MeResponse:
      properties:
        id:
          type: string
          title: Id
        email:
          type: string
          title: Email
      type: object
      required:
      - id
      - email
      title: MeResponse
    RefreshRequest:
      properties:
        refresh_token:
          type: string
          title: Refresh Token
      type: object
      required:
      - refresh_token
      title: RefreshRequest
    SecretWrite:
      properties:
        key_name:
          type: string
          title: Key Name
        value:
          type: string
          title: Value
      type: object
      required:
      - key_name
      - value
      title: SecretWrite
    TokenResponse:
      properties:
        access_token:
          type: string
          title: Access Token
        refresh_token:
          type: string
          title: Refresh Token
        token_type:
          type: string
          title: Token Type
          default: bearer
      type: object
      required:
      - access_token
      - refresh_token
      title: TokenResponse
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          type: array
          title: Location
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
        input:
          title: Input
        ctx:
          type: object
          title: Context
      type: object
      required:
      - loc
      - msg
      - type
      title: ValidationError
