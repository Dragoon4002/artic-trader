line-length = 110
target-version = "py312"

exclude = [
    "hub/deprecated",
    "hub/alembic/versions",
    "venv",
    "__pycache__",
]

[lint]
select = ["E", "F", "W", "I"]
ignore = [
    "E501",  # line too long — handled by black
]

[lint.per-file-ignores]
"hub/db/__init__.py" = ["F401"]
"hub/db/models/__init__.py" = ["F401"]
"hub/vm/__init__.py" = ["F401"]
"hub/audit/__init__.py" = ["F401"]
"tests/**/*.py" = ["F401", "E402"]
